name: Update Data from SharePoint

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          install.packages(c("Microsoft365R", "readxl", "jsonlite"))
        shell: Rscript {0}

      - name: Pull from SharePoint and save JSON
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
        run: |
          library(Microsoft365R)
          library(readxl)
          library(jsonlite)

          app <- create_sharepoint_app(
            tenant = Sys.getenv("MS_TENANT_ID"),
            app = Sys.getenv("MS_CLIENT_ID"),
            password = Sys.getenv("MS_CLIENT_SECRET")
          )

          site <- app$get_sharepoint_site("https://cawater.sharepoint.com/teams/DES-CEMP")
          site$get_drive()$download_file(
            src = "Shared Documents/General/Golden Mussel Sightings_Form Results.xlsx",
            dest = "data.xlsx"
          )

          df <- read_excel("data.xlsx")
          write_json(df, "docs/data.json", pretty = TRUE)
        shell: Rscript {0}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Auto-update map data"
          git push