name: Update Data

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Save data to JSON
        run: |
          echo '${{ github.event.client_payload.data }}' > docs/data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Auto-update map data"
          git push
